<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base 44 | AI Builder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #b0d4e9 0%, #e1eef5 50%, #f4f7f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1a1a1a;
        }

        .container {
            margin-top: 80px;
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        p.tagline {
            font-size: 1.2rem;
            color: #444;
            margin-bottom: 40px;
        }

        .prompt-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            text-align: left;
            min-height: 160px;
        }

        textarea {
            border: none;
            resize: none;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            flex-grow: 1;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-build {
            background-color: #ff9d66;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
        }

        .loader {
            display: none;
            margin-top: 20px;
            font-weight: 600;
            color: #555;
        }

        .suggestions {
            margin-top: 40px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .chip {
            background: rgba(255,255,255,0.4);
            border: 1px solid #999;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #preview-container {
            margin-top: 50px;
            width: 100%;
            display: none;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Build powerful apps<br>and websites - today.</h1>
        <p class="tagline">Describe what you want and build it with Base44.</p>

        <div class="prompt-card">
            <textarea id="userInput" placeholder="Build me a landing page for..."></textarea>
            <div class="actions">
                <button class="btn-build" onclick="generateSite()">Build now &rarr;</button>
            </div>
        </div>

        <div class="loader" id="status">A criar o teu site... aguarda um momento.</div>

        <div class="suggestions">
            <p>Try one of these:</p>
            <div class="chips">
                <button class="chip" onclick="setPrompt('Personal Portfolio')">Personal Portfolio</button>
                <button class="chip" onclick="setPrompt('Online Store')">Online Store</button>
                <button class="chip" onclick="setPrompt('Gaming Blog')">Gaming Blog</button>
                <button class="chip" onclick="setPrompt('Restaurant Site')">Restaurant Site</button>
            </div>
        </div>

        <div id="preview-container">
            <h3>Website Gerado:</h3>
            <iframe id="outputFrame"></iframe>
        </div>
    </div>

    <script>
        function setPrompt(text) {
            document.getElementById('userInput').value = "Build me a " + text;
        }

        async function generateSite() {
            const prompt = document.getElementById('userInput').value;
            if(!prompt) return alert("Escreve algo!");

            const status = document.getElementById('status');
            const preview = document.getElementById('preview-container');
            const frame = document.getElementById('outputFrame');

            status.style.display = "block";
            preview.style.display = "none";

            // USANDO O MODELO E KEY DO TEU CURL
            const apiKey = "AIzaSyBeqIliv2LLWhKA4yqCT_9XAK3gtctw-z8";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;

            const payload = {
                "contents": [
                    {
                        "parts": [
                            {
                                "text": `Write the complete HTML code (including CSS and JS) for: ${prompt}. Return ONLY the raw code. No markdown, no comments.`
                            }
                        ]
                    }
                ]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                let html = data.candidates[0].content.parts[0].text;

                // Limpar possíveis marcas de código markdown
                html = html.replace(/^```html/i, '').replace(/```$/g, '').trim();

                frame.srcdoc = html;
                preview.style.display = "flex";
                window.scrollTo({ top: preview.offsetTop, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                alert("Erro: " + err.message);
            } finally {
                status.style.display = "none";
            }
        }
    </script>
</body>
</html>

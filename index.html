<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base 44 | AI Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            /* Voltamos ao gradiente azul original */
            background: linear-gradient(135deg, #aed2e6 0%, #e0edf4 50%, #f4f7f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111;
        }

        .container {
            margin-top: 80px;
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 40px;
        }

        .prompt-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            text-align: left;
            min-height: 160px;
        }

        textarea {
            border: none;
            resize: none;
            font-size: 1.1rem;
            outline: none;
            flex-grow: 1;
            margin-bottom: 10px;
            background: transparent;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-build {
            background-color: #fc945c;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-build:hover { background-color: #fb8344; }

        /* Animação de Loading */
        #loader {
            display: none;
            margin-top: 30px;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0,0,0,0.1);
            border-top-color: #fc945c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Preview e Refinamento */
        #preview-container {
            margin-top: 40px;
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .refine-box {
            background: white;
            padding: 15px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .refine-box input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 0 15px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Build powerful apps<br>and websites - today.</h1>
        <p class="tagline">Describe what you want and build it with Base44.</p>

        <div class="prompt-card" id="main-input">
            <textarea id="userInput" placeholder="Ex: Um site moderno para uma clínica dentária com imagens reais e botões de contacto..."></textarea>
            <div class="actions">
                <button class="btn-build" onclick="generateSite(false)">Build now &rarr;</button>
            </div>
        </div>

        <div id="loader">
            <div class="spinner"></div>
            <p id="loader-text" style="margin-top: 15px; font-weight: 500;">A desenhar o teu site...</p>
        </div>

        <div id="preview-container">
            <div class="refine-box">
                <input type="text" id="refineInput" placeholder="O que queres mudar? Ex: 'Muda a cor para verde' ou 'Adiciona mais imagens'">
                <button class="btn-build" style="padding: 10px 20px;" onclick="generateSite(true)">Alterar</button>
            </div>
            <iframe id="outputFrame"></iframe>
        </div>
    </div>

    <script>
        let chatHistory = [];
        const loadingTexts = ["A estruturar o HTML...", "A polir o design...", "A carregar imagens reais...", "Quase pronto!"];

        async function generateSite(isRefinement) {
            const prompt = isRefinement ? document.getElementById('refineInput').value : document.getElementById('userInput').value;
            if(!prompt) return;

            const loader = document.getElementById('loader');
            const preview = document.getElementById('preview-container');
            const frame = document.getElementById('outputFrame');
            const mainInput = document.getElementById('main-input');

            loader.style.display = "flex";
            if(!isRefinement) {
                mainInput.style.display = "none";
                preview.style.display = "none";
            }

            // Ciclo de mensagens no loader
            let i = 0;
            const interval = setInterval(() => {
                document.getElementById('loader-text').innerText = loadingTexts[i % loadingTexts.length];
                i++;
            }, 1500);

            // MODELO ATUALIZADO (llama-3.3-70b-versatile)
            const apiKey = "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";
            const url = "https://api.groq.com/openai/v1/chat/completions";

            if (!isRefinement) {
                chatHistory = [{
                    role: "system",
                    content: "És um web designer sénior. Gera sites completos (HTML/CSS/JS num único bloco). Usa imagens REAIS do Unsplash ou Picsum. Usa designs modernos, botões com animação e cores vibrantes. Responde APENAS com o código, começando em <!DOCTYPE html>."
                }];
            }

            chatHistory.push({ role: "user", content: isRefinement ? `Altera o site anterior: ${prompt}` : `Cria este site: ${prompt}` });

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chatHistory,
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                let code = data.choices[0].message.content;
                
                // Limpeza básica de markdown
                code = code.replace(/```html/gi, '').replace(/```/g, '').trim();

                chatHistory.push({ role: "assistant", content: code });
                frame.srcdoc = code;
                preview.style.display = "flex";
                if(isRefinement) document.getElementById('refineInput').value = "";

            } catch (err) {
                alert("Erro: " + err.message);
                mainInput.style.display = "flex";
            } finally {
                loader.style.display = "none";
                clearInterval(interval);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base 44 - Gerador de Websites</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #aed2e6 0%, #e0edf4 50%, #f4f7f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111;
        }

        .hero {
            margin-top: 80px; /* Ajustado agora que não há logo */
            max-width: 800px;
            padding: 0 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 500;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 40px;
        }

        .input-wrapper {
            background: #ffffff;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
            min-height: 140px;
            position: relative;
            box-sizing: border-box;
        }

        textarea {
            border: none;
            resize: none;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            width: 100%;
            flex-grow: 1;
            background: transparent;
            color: #333;
        }

        .build-btn {
            background-color: #fc945c;
            color: #000;
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s ease;
        }

        .build-btn:hover {
            background-color: #fb8344;
        }

        .loading {
            display: none;
            margin-top: 25px;
            font-weight: 600;
            color: #333;
        }

        .suggestions {
            margin-top: 50px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 700px;
            margin: 20px auto;
        }

        .chip {
            background: transparent;
            border: 1px solid #777;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #result-section {
            width: 95%;
            max-width: 1200px;
            margin: 60px auto;
            display: none;
            flex-direction: column;
        }

        #preview-frame {
            width: 100%;
            height: 800px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Build powerful apps<br>and websites - today.</h1>
        <p class="subtitle">Describe what you want and build it with Base44.</p>

        <div class="input-wrapper">
            <textarea id="promptInput" placeholder="Build me a travel blog..."></textarea>
            <button class="build-btn" onclick="generateWebsite()">Build now &rarr;</button>
        </div>

        <div class="loading" id="loadingStatus">A gerar o teu código... por favor aguarda.</div>

        <div class="suggestions">
            <p>Not sure where to start? Try one of these:</p>
            <div class="chips">
                <button class="chip" onclick="fillPrompt('Admin Dashboard')">Admin Dashboard</button>
                <button class="chip" onclick="fillPrompt('Landing Page')">Landing Page</button>
                <button class="chip" onclick="fillPrompt('Gaming Platform')">Gaming Platform</button>
                <button class="chip" onclick="fillPrompt('Online Store')">Online Store</button>
            </div>
        </div>
    </div>

    <div id="result-section">
        <h3>Preview do teu site:</h3>
        <iframe id="preview-frame"></iframe>
    </div>

    <script>
        function fillPrompt(text) {
            document.getElementById('promptInput').value = `Build me a ${text}`;
        }

        async function generateWebsite() {
            const userRequest = document.getElementById('promptInput').value.trim();
            if (!userRequest) return;

            const apiKey = 'AIzaSyBeqIliv2LLWhKA4yqCT_9XAK3gtctw-z8';
            // Corrigido para a versão estável v1 e modelo flash
            const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const loadingStatus = document.getElementById('loadingStatus');
            const resultSection = document.getElementById('result-section');
            const iframe = document.getElementById('preview-frame');

            loadingStatus.style.display = 'block';
            resultSection.style.display = 'none';

            const systemPrompt = `Act as a professional web developer. Create a complete, modern, and high-quality website based on this request: "${userRequest}". 
            Output ONLY the raw HTML/CSS/JS code in a single block. Do not use markdown backticks, explanations, or comments outside the code. The response must start with <!DOCTYPE html>.`;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt }]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                let generatedCode = data.candidates[0].content.parts[0].text;
                
                // Limpeza extra para garantir que não aparecem aspas de código no início/fim
                generatedCode = generatedCode.replace(/^```html/i, '').replace(/```$/g, '').trim();

                iframe.srcdoc = generatedCode;
                resultSection.style.display = 'flex';
                
                // Scroll suave para o resultado
                window.scrollTo({ top: resultSection.offsetTop, behavior: 'smooth' });

            } catch (error) {
                console.error('Erro:', error);
                alert('Erro na API: ' + error.message);
            } finally {
                loadingStatus.style.display = 'none';
            }
        }
    </script>
</body>
</html>
